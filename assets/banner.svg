<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="cyberdeck — a TUI + LAN web UI for the ClockworkPi uconsole">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a1240"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#101a14"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ff7a18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#2a2f55" stroke-width="0.5" opacity="0.35">
    <path d="M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200"/>
    <path d="M40 0 V320 M80 0 V320 M120 0 V320 M160 0 V320 M200 0 V320 M240 0 V320 M280 0 V320 M320 0 V320 M360 0 V320 M400 0 V320 M440 0 V320 M480 0 V320 M520 0 V320 M560 0 V320 M600 0 V320 M640 0 V320 M680 0 V320 M720 0 V320 M760 0 V320 M800 0 V320 M840 0 V320 M880 0 V320 M920 0 V320 M960 0 V320 M1000 0 V320 M1040 0 V320 M1080 0 V320 M1120 0 V320 M1160 0 V320"/>
  </g>

  <!-- uconsole body -->
  <g transform="translate(60 60)">
    <!-- shell -->
    <rect x="0" y="0" width="380" height="200" rx="14" ry="14" fill="#2b2436" stroke="#3a3450" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="22" rx="14" ry="14" fill="#3a3450"/>
    <rect x="0" y="14" width="380" height="10" fill="#3a3450"/>
    <!-- hinge label -->
    <text x="14" y="16" font-family="ui-monospace, monospace" font-size="11" fill="#9aa0c5">clockworkpi · uconsole</text>
    <circle cx="356" cy="11" r="2" fill="#ff7a18"/>
    <circle cx="346" cy="11" r="2" fill="#ffb454"/>
    <circle cx="336" cy="11" r="2" fill="#7fdca0"/>

    <!-- screen -->
    <rect x="20" y="34" width="340" height="146" rx="4" fill="#0a0e18" stroke="#000" stroke-width="2"/>
    <rect x="22" y="36" width="336" height="142" fill="url(#screen)"/>

    <!-- TUI screen contents -->
    <g font-family="ui-monospace, monospace" font-size="10" fill="#9be3a3">
      <text x="30" y="50" fill="#7fdca0">┌─ cyberdeck ──────────────────────┐</text>
      <text x="30" y="62">│</text>
      <text x="40" y="62" fill="#9aa0c5">[1] System   [2] Net   [3] BT</text>
      <text x="30" y="74">│</text>
      <text x="40" y="74" fill="#9aa0c5">[4] Power   [5] Disp  [6] Audio</text>
      <text x="30" y="86">│</text>
      <text x="40" y="86" fill="#ffb454">▶ focus: pane 1  88%  2.4 GHz</text>
      <text x="30" y="98">│</text>
      <text x="40" y="98" fill="#9be3a3">  ▲ uptime 4d  RAM 1.2/4G  45°C</text>
      <text x="30" y="110">│</text>
      <text x="40" y="110" fill="#9aa0c5">  ▸ ssid home-5g  ▸ bat 71%</text>
      <text x="30" y="122">│</text>
      <text x="40" y="122" fill="#7fdca0">  ▸ /dev/mmcblk0  ▸ nmcli ok</text>
      <text x="30" y="134">│</text>
      <text x="40" y="134" fill="#ffb454">  ⌘ Ctrl-W split  ⌘ ^P palette</text>
      <text x="30" y="146">│</text>
      <text x="40" y="146" fill="#9be3a3">  ▸ WM: split tree 2×3 panes</text>
      <text x="30" y="158">│</text>
      <text x="40" y="158" fill="#9aa0c5">  ▸ web @ http://10.0.0.42:7878</text>
      <text x="30" y="170">│</text>
      <text x="40" y="170" fill="#7fdca0">  ▸ log: 2 toasts · 0 errors</text>
      <text x="30" y="182">│</text>
      <text x="40" y="182" fill="#ff7a18">  ▸ ▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔</text>
      <text x="30" y="194" fill="#7fdca0">└──────────────────────────────────┘</text>
    </g>

    <!-- keyboard -->
    <g transform="translate(20 188)" fill="#1c1828" stroke="#3a3450" stroke-width="0.8">
      <rect x="0" y="0" width="340" height="8" rx="2"/>
      <g>
        <rect x="6"   y="2" width="14" height="4" rx="1"/>
        <rect x="22"  y="2" width="14" height="4" rx="1"/>
        <rect x="38"  y="2" width="14" height="4" rx="1"/>
        <rect x="54"  y="2" width="14" height="4" rx="1"/>
        <rect x="70"  y="2" width="14" height="4" rx="1"/>
        <rect x="86"  y="2" width="14" height="4" rx="1"/>
        <rect x="102" y="2" width="14" height="4" rx="1"/>
        <rect x="118" y="2" width="14" height="4" rx="1"/>
        <rect x="134" y="2" width="14" height="4" rx="1"/>
        <rect x="150" y="2" width="14" height="4" rx="1"/>
        <rect x="166" y="2" width="14" height="4" rx="1"/>
        <rect x="182" y="2" width="14" height="4" rx="1"/>
        <rect x="198" y="2" width="14" height="4" rx="1"/>
        <rect x="214" y="2" width="14" height="4" rx="1"/>
        <rect x="230" y="2" width="14" height="4" rx="1"/>
        <rect x="246" y="2" width="14" height="4" rx="1"/>
        <rect x="262" y="2" width="14" height="4" rx="1"/>
        <rect x="278" y="2" width="14" height="4" rx="1"/>
        <rect x="294" y="2" width="14" height="4" rx="1"/>
        <rect x="310" y="2" width="20" height="4" rx="1"/>
      </g>
    </g>
  </g>

  <!-- title -->
  <g transform="translate(490 100)">
    <text font-family="ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="800" fill="#f0f3ff" filter="url(#glow)">cyberdeck</text>
    <text y="36" font-family="ui-monospace, monospace" font-size="14" fill="#9be3a3">a TUI + LAN web UI for the clockworkpi uconsole</text>
    <text y="58" font-family="ui-monospace, monospace" font-size="13" fill="#ffb454">13 screens · live PTY · split WM · axum bridge · ratatui</text>
    <text y="84" font-family="ui-monospace, monospace" font-size="12" fill="#7fdca0">$ curl -fsSL …/install.sh | bash -s -- --tui</text>
    <text y="106" font-family="ui-monospace, monospace" font-size="12" fill="#9aa0c5">debian 13 trixie · aarch64 · networkmanager · systemd</text>
  </g>

  <!-- right side: PTY pane -->
  <g transform="translate(900 60)">
    <rect x="0" y="0" width="240" height="200" rx="6" fill="#0a0e18" stroke="#3a3450" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="20" rx="6" fill="#1f1830"/>
    <rect x="0" y="14" width="240" height="6" fill="#1f1830"/>
    <text x="10" y="14" font-family="ui-monospace, monospace" font-size="11" fill="#ffb454">1: ~$</text>
    <circle cx="220" cy="10" r="3" fill="#7fdca0"/>
    <circle cx="208" cy="10" r="3" fill="#ffb454"/>
    <circle cx="196" cy="10" r="3" fill="#ff7a18"/>

    <g font-family="ui-monospace, monospace" font-size="10">
      <text x="10" y="38" fill="#9be3a3">ankur@uconsole:~$</text>
      <text x="120" y="38" fill="#f0f3ff">systemctl --user</text>
      <text x="10" y="52" fill="#9be3a3">                  </text>
      <text x="120" y="52" fill="#9aa0c5">status cyberdeck</text>
      <text x="10" y="66" fill="#7fdca0">● cyberdeck.service</text>
      <text x="10" y="80" fill="#7fdca0">     Active: active</text>
      <text x="10" y="94" fill="#7fdca0">     (running)</text>
      <text x="10" y="108" fill="#9be3a3">ankur@uconsole:~$</text>
      <text x="120" y="108" fill="#f0f3ff">nmcli dev wifi</text>
      <text x="10" y="122" fill="#9aa0c5">IN-USE  BSSID</text>
      <text x="10" y="136" fill="#9be3a3">* home-5g  8C:…</text>
      <text x="10" y="150" fill="#9be3a3">  ip 10.0.0.42/24</text>
      <text x="10" y="164" fill="#9be3a3">ankur@uconsole:~$</text>
      <text x="120" y="164" fill="#ffb454">▌</text>
      <text x="10" y="178" fill="#ff7a18">[wm] split ⌘ Ctrl-W</text>
      <text x="10" y="192" fill="#ff7a18">[wm] jump pane 1-9</text>
    </g>
  </g>

  <!-- footer rule -->
  <line x1="60" y1="285" x2="1140" y2="285" stroke="#3a3450" stroke-width="1"/>
  <text x="60" y="302" font-family="ui-monospace, monospace" font-size="11" fill="#9aa0c5">MIT · ratatui · axum 0.7 · portable-pty · vte · crossterm</text>
  <text x="1140" y="302" font-family="ui-monospace, monospace" font-size="11" fill="#ffb454" text-anchor="end">signed off · blumi</text>
</svg>
