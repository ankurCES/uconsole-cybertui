<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Inline data-URL favicon so the browser doesn't 404 on /favicon.ico.
         A tiny cyan dot on the dark radar background. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='3' fill='%237fdcff'/%3E%3C/svg%3E">
</head>
<body>
    <header class="topbar">
        <span class="title">{{ title }}</span>
        <span class="version">{{ version }}</span>
        <span id="status" class="status">connecting…</span>
    </header>
    <main class="layout">
        <section class="radar-pane">
            <canvas id="radar" width="640" height="640"></canvas>
        </section>
        <aside class="tag-pane">
            <section id="vitals" class="vitals" data-present="false">
                <h2>Human sensing <span id="vitals-src" class="vitals-src">CSI</span></h2>
                <div class="vitals-presence">
                    <span id="vitals-dot" class="vitals-dot"></span>
                    <span id="vitals-presence-text">no signal</span>
                </div>
                <div class="vitals-grid">
                    <div class="vital">
                        <div class="vital-label">breathing</div>
                        <div><span id="vitals-breath" class="vital-num">–</span> <span class="vital-unit">bpm</span></div>
                        <div id="vitals-breath-conf" class="vital-conf"></div>
                    </div>
                    <div class="vital">
                        <div class="vital-label">heart</div>
                        <div><span id="vitals-heart" class="vital-num">–</span> <span class="vital-unit">bpm</span></div>
                        <div id="vitals-heart-conf" class="vital-conf"></div>
                    </div>
                </div>
                <div id="vitals-meta" class="vitals-meta">waiting for nexmon CSI on :5500…</div>
            </section>
            <h2>Devices</h2>
            <ul id="device-list" class="device-list"></ul>
            <details class="tag-editor">
                <summary>Add / edit a tag</summary>
                <label>MAC <input id="tag-mac" placeholder="aa:bb:cc:dd:ee:ff"></label>
                <label>Label <input id="tag-label" placeholder="Ankur's phone"></label>
                <label>Icon
                    <select id="tag-icon">
                        <option value="person">person</option>
                        <option value="phone">phone</option>
                        <option value="laptop">laptop</option>
                        <option value="tablet">tablet</option>
                        <option value="speaker">speaker</option>
                        <option value="tv">tv</option>
                        <option value="watch">watch</option>
                        <option value="generic">generic</option>
                    </select>
                </label>
                <label>Color <input id="tag-color" type="color" value="#7fdcff"></label>
                <div class="actions">
                    <button id="tag-save" type="button">Save</button>
                    <button id="tag-delete" type="button">Delete</button>
                </div>
            </details>
        </aside>
    </main>
    <script src="/static/radar.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
