<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cyberdeck</title>
<style>
  :root { --bg:#11131a; --fg:#dcdce0; --dim:#7a7a85; --accent:#00c8dc; --accent2:#aa78ff; --warn:#f0b43c; --err:#f05a5a; --ok:#6edc82; --border:#46464f; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-monospace, "JetBrains Mono", "Fira Code", Menlo, monospace; }
  .shell { display: grid; grid-template-rows: 32px 1fr 28px; height: 100vh; }
  header { display: flex; gap: 14px; align-items: center; padding: 0 12px; border-bottom: 1px solid var(--border); }
  header .pill { color: var(--dim); }
  header .pill b { color: var(--fg); font-weight: 500; }
  .main { display: grid; grid-template-columns: 220px 1fr; overflow: hidden; }
  aside { border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
  aside .item { padding: 4px 14px; color: var(--fg); cursor: pointer; }
  aside .item:hover { background: rgba(255,255,255,.04); }
  aside .item.active { background: var(--accent); color: #0c0e15; font-weight: 600; }
  main { overflow-y: auto; padding: 14px 18px; }
  main h1 { font-size: 14px; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; letter-spacing: .08em; }
  main h2 { font-size: 12px; text-transform: uppercase; color: var(--dim); margin: 18px 0 6px; letter-spacing: .08em; }
  .row { display: flex; gap: 14px; padding: 2px 0; }
  .row .k { color: var(--dim); width: 110px; }
  .row .v { color: var(--fg); }
  .row .v.accent { color: var(--accent); }
  .row .v.warn { color: var(--warn); }
  .row .v.err { color: var(--err); }
  .row .v.ok { color: var(--ok); }
  .bar { display: inline-block; font-family: ui-monospace, monospace; }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 4px 8px; text-align: left; border-bottom: 1px solid #1c1e26; }
  th { color: var(--dim); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
  footer { display: flex; gap: 16px; align-items: center; padding: 0 12px; border-top: 1px solid var(--border); color: var(--dim); font-size: 12px; }
  footer .spacer { flex: 1; }
  footer .clock { color: var(--accent); }
  .scrollable { max-height: 320px; overflow-y: auto; }
  button, .btn { background: #1c1e26; color: var(--fg); border: 1px solid var(--border); padding: 4px 10px; cursor: pointer; font: inherit; }
  button:hover, .btn:hover { border-color: var(--accent); color: var(--accent); }
  input[type=text], input[type=password] { background: #1c1e26; color: var(--fg); border: 1px solid var(--border); padding: 4px 8px; font: inherit; }
  .ok, .warn, .err { padding: 1px 6px; border-radius: 3px; font-size: 11px; text-transform: uppercase; }
  .ok { background: rgba(110,220,130,.12); color: var(--ok); }
  .warn { background: rgba(240,180,60,.12); color: var(--warn); }
  .err { background: rgba(240,90,90,.12); color: var(--err); }
</style>
</head>
<body>
<div class="shell">
  <header id="hdr">
    <span class="pill">cyberdeck <b id="hdr-host">…</b></span>
    <span class="pill"><b id="hdr-kernel">…</b></span>
    <span class="pill">up <b id="hdr-up">…</b></span>
    <span class="pill">load <b id="hdr-load">…</b></span>
    <span class="pill">mem <b id="hdr-mem">…</b></span>
    <span class="pill" id="hdr-ssid" hidden>wifi <b id="hdr-ssid-v">…</b></span>
    <span class="pill" id="hdr-bat" hidden>bat <b id="hdr-bat-v">…</b></span>
    <span class="pill" id="hdr-temp" hidden>cpu <b id="hdr-temp-v">…</b></span>
  </header>
  <div class="main">
    <aside id="nav"></aside>
    <main id="view"></main>
  </div>
  <footer>
    <span>↑↓ nav</span><span>1..9 jump</span><span>r refresh</span><span class="spacer"></span>
    <span class="clock" id="clock">…</span>
  </footer>
</div>
<script src="/static/app.js"></script>
</body>
</html>
